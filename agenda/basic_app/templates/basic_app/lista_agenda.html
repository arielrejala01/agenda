{% extends 'base.html' %}
{% block body_block %}
  <ol>
    {% for agenda in lista_agenda %}
      <li><a href="{% url 'basic_app:detalle_agenda' pk=agenda.id %}">{{ agenda.cliente.nombre }} {{ agenda.fecha_hora }}</a></li>
    {% endfor %}
  </ol>
  <a href="{% url 'basic_app:crear_agenda' %}" class="btn btn-success">Crear</a>
{% endblock %}
