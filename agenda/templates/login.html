<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="../static/estilos.css" type="text/css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
</head>
<body>
  <div class="login">
    <form action="{% url 'login' %}" method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="username" class="form-label">Usuario:</label>
        <input type="text" name="username" placeholder="Introduzca usuario" class="form-control">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña:</label>
        <input type="password" name="password" class="form-control">
      </div>

        <input type="submit" name="enviar" value="Login" class="btn btn-success w-100">
    </form>
  </div>
</body>
</html>
