{% extends 'base.html' %}
{% block head_block %}
  <link href="/static/base.css" type="text/css" rel="stylesheet">
{% endblock %}
{% block body_block %}
  <div class="confirmar">
    <h1>Confirmacion</h1>
    <h2>Desea eliminar la agenda del cliente: {{ agenda.cliente.nombre }} {{ agenda.cliente.apellido }}</h2>
    <form method="POST">
      {% csrf_token %}
      <input type="submit" class="btn btn-danger" value="Eliminar" id="eliminar">
      <a href="{% url 'basic_app:lista_agenda'%}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
{% endblock %}
