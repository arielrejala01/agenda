{% extends 'base.html' %}
{% block head_block %}
  <link href="/static/base.css" type="text/css" rel="stylesheet">
{% endblock %}
{% block body_block %}
  <h1>{% if not form.instance.pk %}
    Crear Agenda
  {% else %}
    Actualizar Agenda
  {% endif %}</h1>
  <form method="POST">
    <div class="form-outline mb-4">
    {% csrf_token %}
    {{ form.as_p }}
    </div>
    <input type="submit" value="Enviar" class="btn btn-success" id="crear">
  </form>
{% endblock %}
