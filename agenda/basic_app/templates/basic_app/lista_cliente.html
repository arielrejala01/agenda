{% extends 'base.html' %}
{% block body_block %}
  <ol>
    {% for cliente in lista_cliente %}
      <li><a href="{% url 'basic_app:detalle_cliente' pk=cliente.id %}">{{ cliente.nombre }} {{ cliente.apellido }}</a></li>
    {% endfor %}
  </ol>
  <a href="{% url 'basic_app:crear_cliente' %}" class="btn btn-success">Crear</a>
{% endblock %}
